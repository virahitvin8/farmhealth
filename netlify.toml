# ─── Netlify Configuration – FarmHealth Satellite Crop Monitor ───
# Deploy the static frontend (Vanilla JS + Leaflet) to Netlify
# The backend (Node.js GEE proxy) runs separately on Railway

[build]
  publish = "."

[dev]
  framework = "#static"

# SPA redirects: serve index.html for all routes (so the app handles routing)
[[redirects]]
  from = "/api/*"
  to = "https://farmhealth-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and PWA support
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self)"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
